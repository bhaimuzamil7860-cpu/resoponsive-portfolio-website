<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Success</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(45deg, black, darkblue);
    font-family:Arial;
    color:white;
}

h1{
    font-size:60px;
    animation:zoom 1s infinite alternate;
}

a{
    margin-top:20px;
    text-decoration:none;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:white;
    cursor:pointer;
    font-size:18px;
}

@keyframes zoom{

from{
transform:scale(1);
}

to{
transform:scale(1.1);
}

}

</style>

</head>

<body>

<h1>🎉 Congratulations 🎉</h1>

<a href="index.html">
<button>Back To Home</button>
</a>

</body>
</html>
